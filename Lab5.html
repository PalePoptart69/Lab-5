<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TheSlap – Join the Slappers</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

  <div class="container py-5">
    <h1 class="text-center mb-2">TheSlap</h1>
    <p class="text-center text-muted mb-4">
      A social media platform where your photos, reels, and commments really slap.
    </p>
    <div class="row justify-content-center">
      <div class="col-md-8 col-lg-6">
        <div class="card shadow-sm">
          <div class="card-header text-center">
            Create your TheSlap account
          </div>
          <div class="card-body">

            <form id="registrationForm">
              <div class="mb-3">
                <label for="firstName" class="form-label">First Name</label>
                <input type="text" class="form-control" id="firstName" placeholder="Andre" required>
              </div>

              <div class="mb-3">
                <label for="lastName" class="form-label">Last Name</label>
                <input type="text" class="form-control" id="lastName" placeholder="Harris" required>
              </div>

              <div class="mb-3">
                <label for="email" class="form-label">Email Address</label>
                <input type="email" class="form-control" id="email" placeholder="you@example.com" required>
              </div>

              <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" id="password" required>
                <div class="form-text">
                  Password must contain at least one <strong>!</strong> or <strong>?</strong>.
                </div>
              </div>

              <div class="mb-3">
                <label for="dob" class="form-label">Date of Birth</label>
                <input type="date" class="form-control" id="dob" required>
              </div>

              <button type="submit" class="btn btn-primary w-100">
                Join TheSlap
              </button>
            </form>

            <div id="message" class="mt-4"></div>

          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    function User(firstName, lastName, email, password, dob) {
      this.firstName = firstName;
      this.lastName = lastName;
      this.email = email;
      this.password = password;
      this.dob = dob;
    }

    function maskPassword(pwd) {
      return "*".repeat(pwd.length);
    }

    function allFieldsPresent(user) {
      return (
        user.firstName.trim() !== "" &&
        user.lastName.trim() !== "" &&
        user.email.trim() !== "" &&
        user.password.trim() !== "" &&
        user.dob.trim() !== ""
      );
    }

    function isValidPassword(pwd) {
      return /[!?]/.test(pwd);
    }

    document.getElementById("registrationForm").addEventListener("submit", function (e) {
      e.preventDefault();

      const firstName = document.getElementById("firstName").value;
      const lastName = document.getElementById("lastName").value;
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      const dob = document.getElementById("dob").value;

      const user = new User(firstName, lastName, email, password, dob);
      const messageDiv = document.getElementById("message");

      if (!allFieldsPresent(user)) {
        messageDiv.innerHTML = `
          <div class="alert alert-danger">
            Registration failed: All fields are required to join TheSlap.
          </div>
        `;
        return;
      }

      if (!isValidPassword(user.password)) {
        messageDiv.innerHTML = `
          <div class="alert alert-danger">
            Registration failed: Password must contain at least one "!" or "?".
          </div>
        `;
        return;
      }

      user.password = maskPassword(user.password);

      messageDiv.innerHTML = `
        <div class="alert alert-success">
          <h4 class="alert-heading">Registration Successful!</h4>
          <p>Welcome to <strong>TheSlap</strong>, ${user.firstName} ${user.lastName}!</p>
          <hr>
          <p><strong>First Name:</strong> ${user.firstName}</p>
          <p><strong>Last Name:</strong> ${user.lastName}</p>
          <p><strong>Email:</strong> ${user.email}</p>
          <p><strong>Password:</strong> ${user.password}</p>
          <p><strong>Date of Birth:</strong> ${user.dob}</p>
          <p class="mt-2 mb-0">
            Your feed is ready. Start posting slaps, stories, and reels, enjoy!
          </p>
        </div>
      `;
    });
  </script>
</body>
</html>
